      RCON_PASSWORD: ${RCON_PASSWORD:-changeme}
      BACKUP_INTERVAL: "24h"
      INITIAL_DELAY: "2m"
      PRUNE_BACKUPS_COUNT: "3"
    volumes:
    - ./servers/creative/data:/data:ro
    - ./backups/creative:/backups
    networks:
    - minecraft-net
    restart: unless-stopped
  test:
