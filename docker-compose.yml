        ferrite-core
        c2me-fabric
        scalablelux
        noisiumforked
        distanthorizons
        bluemap
        simple-voice-chat
      WHITELIST_ENABLED: "true"
      ENFORCE_WHITELIST: "true"
      OPS: d2683803
      WHITELIST: d2683803,Kam93
      MOTD: "Creative Server"
      MODE: creative
      RCON_PASSWORD: ${RCON_PASSWORD:-changeme}
    ports:
    - "24454:24454/udp"
    - "127.0.0.1:8100:8100"
    volumes:
    - ./servers/creative/data:/data
    networks:
    - minecraft-net
    deploy:
