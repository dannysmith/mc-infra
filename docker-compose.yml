services:
  acme-dns:
    image: joohoi/acme-dns
    container_name: acme-dns
    ports:
      - "53:53"
      - "53:53/udp"
      - "127.0.0.1:8053:80"
    volumes:
      - ./acme-dns/config:/etc/acme-dns:ro
      - ./acme-dns/data:/var/lib/acme-dns
    restart: unless-stopped

  mc-router:
    image: itzg/mc-router
    container_name: mc-router
    ports:
      - "25565:25565"
    environment:
      MAPPING: |
        creative.mc.danny.is=creative:25565
        test.mc.danny.is=test:25565
    networks:
      - minecraft-net
    restart: unless-stopped

  creative:
    image: itzg/minecraft-server
    container_name: creative
    env_file:
      - servers/creative/env
    environment:
      EULA: "TRUE"
      TYPE: FABRIC
      VERSION: LATEST
      MEMORY: 4G
      MODRINTH_ALLOWED_VERSION_TYPE: beta
      MODRINTH_PROJECTS: |
        fabric-api
        lithium
        ferrite-core
        scalablelux
        c2me-fabric
        distanthorizons
        bluemap
        simple-voice-chat
      WHITELIST_ENABLED: "true"
      ENFORCE_WHITELIST: "true"
      OPS: d2683803
      WHITELIST: d2683803
      MOTD: "Creative Server"
      DIFFICULTY: normal
      MODE: creative
      RCON_PASSWORD: ${RCON_PASSWORD}
      ENABLE_COMMAND_BLOCK: "true"
    ports:
      - "24454:24454/udp"
      - "127.0.0.1:8100:8100"
    volumes:
      - ./servers/creative/data:/data
    networks:
      - minecraft-net
    deploy:
      resources:
        limits:
          memory: 5g
          cpus: "2.0"
    restart: unless-stopped

  test:
    image: itzg/minecraft-server
    container_name: test
    environment:
      EULA: "TRUE"
      VERSION: LATEST
      MEMORY: 1G
      WHITELIST_ENABLED: "true"
      ENFORCE_WHITELIST: "true"
      OPS: d2683803
      WHITELIST: d2683803
      MOTD: "Test Server"
      RCON_PASSWORD: ${RCON_PASSWORD}
    volumes:
      - ./servers/test/data:/data
    networks:
      - minecraft-net
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.0"
    restart: unless-stopped

networks:
  minecraft-net:
    driver: bridge
