# Generated by mc-generate — edit manifest.yml instead


server {
    listen 80;
    server_name mc.danny.is *.mc.danny.is;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    include /opt/minecraft/nginx/conf.d/ssl.conf;

    return 404;
}

server {
    listen 443 ssl;
    server_name map-n19.mc.danny.is;

    include /opt/minecraft/nginx/conf.d/ssl.conf;

    # Gzip compression for BlueMap web assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # BlueMap uses WebSockets for live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache map tiles in the browser
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}

