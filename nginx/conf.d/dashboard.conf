# Dashboard reverse proxy (manually managed, not generated by mc-generate)
#
# Basic auth uses nginx/.htpasswd — create/recreate with:
#   printf 'danny:%s\n' "$(openssl passwd -apr1 'YOUR_PASSWORD')" > nginx/.htpasswd
#   (add more users by appending lines in the same format)

server {
    listen 443 ssl;
    server_name dashboard.mc.danny.is;

    include /opt/minecraft/nginx/conf.d/ssl.conf;

    auth_basic "MC Dashboard";
    auth_basic_user_file /opt/minecraft/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future log streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
